  globeGroup.add(ring);

  // Create concept nodes
  CONCEPTS.forEach(c => {
    const color = new THREE.Color(DOMAIN_COLORS[c.domain] || '#888');
    const geometry = new THREE.SphereGeometry(0.06, 16, 12);
    const material = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.4, shininess: 80 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(c.x, c.y, c.z);
    mesh.userData = { id: c.id, type: 'concept' };
    globeGroup.add(mesh);
    conceptMeshes.push(mesh);

    // Glow sprite
    const spriteMat = new THREE.SpriteMaterial({ color: color, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.3 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(0.2, 0.2, 1);
    mesh.add(sprite);

    // Label (canvas texture)
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256; labelCanvas.height = 64;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = '#' + color.getHexString();
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, 128, 40);
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    const labelMat = new THREE.SpriteMaterial({ map: labelTex, depthWrite: false, depthTest: false, transparent: true, opacity: 0.85 });
    const labelSprite = new THREE.Sprite(labelMat);
    labelSprite.scale.set(0.5, 0.125, 1);
    labelSprite.position.set(0, 0.12, 0);
    mesh.add(labelSprite);
  });

  // Create evolution path curves
  EVOLUTION_PATHS.forEach(ep => {
    const points = [];
    ep.steps.forEach(([cid, year, label]) => {
      const concept = CONCEPTS.find(c => c.id === cid);
      if (concept) {
        points.push(new THREE.Vector3(concept.x, concept.y, concept.z));
      }
    });
    if (points.length >= 2) {
      const curve = new THREE.CatmullRomCurve3(points, false, 'centripetal', 0.5);
      const curvePoints = curve.getPoints(points.length * 8);
      const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
      const lineMat = new THREE.LineBasicMaterial({ color: new THREE.Color(ep.color), transparent: true, opacity: 0.5, linewidth: 1 });
      const line = new THREE.Line(lineGeo, lineMat);
      globeGroup.add(line);
      pathLines.push({ line, epId: ep.id });

      // Year labels at each step
      ep.steps.forEach(([cid, year, label], idx) => {
        if (idx === 0) return;
        const prevCid = ep.steps[idx-1][0];
        const prevC = CONCEPTS.find(c => c.id === prevCid);
        const currC = CONCEPTS.find(c => c.id === cid);
        if (!prevC || !currC) return;
        const mid = new THREE.Vector3().addVectors(
          new THREE.Vector3(prevC.x, prevC.y, prevC.z),
          new THREE.Vector3(currC.x, currC.y, currC.z)
        ).multiplyScalar(0.5).normalize().multiplyScalar(1.82);
        const yearCanvas = document.createElement('canvas');
        yearCanvas.width = 128; yearCanvas.height = 48;
        const yctx = yearCanvas.getContext('2d');
        yctx.fillStyle = ep.color;
        yctx.font = '20px sans-serif';
        yctx.textAlign = 'center';
        yctx.fillText(String(year), 64, 30);
        const yTex = new THREE.CanvasTexture(yearCanvas);
        const yMat = new THREE.SpriteMaterial({ map: yTex, depthWrite: false, depthTest: false, transparent: true, opacity: 0.7 });
        const ySprite = new THREE.Sprite(yMat);
        ySprite.scale.set(0.25, 0.094, 1);
        ySprite.position.copy(mid);
        globeGroup.add(ySprite);
      });
    }
  });

  // Create document nodes (ring around globe)
  DOCUMENTS.forEach((d, i) => {
    const angle = (i / DOCUMENTS.length) * Math.PI * 2;
    const x = 2.8 * Math.cos(angle);
    const z = 2.8 * Math.sin(angle);
    const y = 0.3 * Math.sin(angle * 2);
    const geometry = new THREE.BoxGeometry(0.08, 0.1, 0.04);
    const material = new THREE.MeshPhongMaterial({ color: 0xaaaa66, emissive: 0x444422, emissiveIntensity: 0.3 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, y, z);
    mesh.userData = { id: d.id, type: 'document' };
    scene.add(mesh);
    docMeshes.push(mesh);
  });

  // Controls (simple OrbitControls replacement)
  setupControls(container);

  window.addEventListener('resize', onResize);
  container.addEventListener('click', onClick);
  container.addEventListener('mousemove', onMouseMove);
  document.addEventListener('keydown', onKeyDown);

  document.getElementById('loading').style.display = 'none';
  animate();
}

function createLatLine(latDeg) {
  const phi = Math.PI / 2 - (latDeg * Math.PI / 180);
  const r = 1.8 * Math.cos(phi);
  const y = 1.8 * Math.sin(phi);
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const theta = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta)));
  }
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineBasicMaterial({ color: 0x1a3050, transparent: true, opacity: 0.25 });
  return new THREE.Line(g, m);
}

function createLonLine(lonDeg) {
  const theta = lonDeg * Math.PI / 180;
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const phi = (i / 128) * Math.PI;
    pts.push(new THREE.Vector3(1.8*Math.sin(phi)*Math.cos(theta), 1.8*Math.cos(phi), 1.8*Math.sin(phi)*Math.sin(theta)));
  }
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineBasicMaterial({ color: 0x1a3050, transparent: true, opacity: 0.25 });
  return new THREE.Line(g, m);
}

// ============ SIMPLE ORBIT CONTROLS ============
let isDragging = false, prevMouse = {x:0,y:0};
let rotX = 0, rotY = 0, zoomLevel = 5.5;
function setupControls(container) {
  container.addEventListener('mousedown', e => { isDragging = true; prevMouse = {x:e.clientX,y:e.clientY}; });
  container.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
    rotY += dx * 0.005; rotX += dy * 0.005;
    prevMouse = {x:e.clientX,y:e.clientY};
  });
  container.addEventListener('mouseup', () => isDragging = false);
  container.addEventListener('mouseleave', () => isDragging = false);
  container.addEventListener('wheel', e => {
    zoomLevel = Math.max(2, Math.min(15, zoomLevel + e.deltaY * 0.005));
    e.preventDefault();
  }, {passive: false});
}

function updateCamera() {
  const r = zoomLevel;
  camera.position.x = r * Math.cos(rotX) * Math.sin(rotY);
  camera.position.y = r * Math.sin(rotX);
  camera.position.z = r * Math.cos(rotX) * Math.cos(rotY);
  camera.lookAt(0, 0, 0);
  if (autoRotate && !isDragging) {
    rotY += 0.002;
  }
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============ INTERACTION ============
function onClick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [...conceptMeshes, ...docMeshes];
  const intersects = raycaster.intersectObjects(allMeshes);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const id = obj.userData.id;
    selectedNodeId = id;
    showDetail(id, obj.userData.type);
    // Highlight
    allMeshes.forEach(m => {
      if (m.userData.id === id) {
        m.scale.setScalar(1.8);
      } else {
        m.scale.setScalar(1.0);
      }
    });
  } else {
    selectedNodeId = null;
    document.getElementById('detail-panel').innerHTML = '<p style="color:#667;font-size:13px">👆 点击球体上的节点查看详细信息</p>';
    [...conceptMeshes, ...docMeshes].forEach(m => m.scale.setScalar(1.0));
  }
}

function onMouseMove(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [...conceptMeshes, ...docMeshes];
  const intersects = raycaster.intersectObjects(allMeshes);
  document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
  // Hover highlight
  allMeshes.forEach(m => {
    if (intersects.length > 0 && intersects[0].object === m) {
      if (m.userData.id !== selectedNodeId) m.scale.setScalar(1.4);
    } else if (m.userData.id !== selectedNodeId) {
      m.scale.setScalar(1.0);
    }
  });
}

function onKeyDown(e) {
  if (e.key === 'r' || e.key === 'R') { autoRotate = !autoRotate; }
  if (e.key === 'f' || e.key === 'F') { rotX = 0.3; rotY = 0.5; zoomLevel = 5.5; }
  if (e.key === 't' || e.key === 'T') { rotX = Math.PI/2-0.01; rotY = 0; zoomLevel = 7; }
  if (e.key === '0') { rotX = 0.3; rotY = 0.5; zoomLevel = 5.5; activeDomain=null; activeDifficulty=null; activePath=null; onSearch(''); document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.filter-group')[0].querySelector('.filter-btn').classList.add('active'); document.querySelectorAll('.filter-group')[1].querySelector('.filter-btn').classList.add('active'); document.querySelectorAll('.filter-group')[2].querySelector('.filter-btn').classList.add('active'); applyFilters(); }
}

// ============ DETAIL PANEL ============
function showDetail(id, type) {
  const panel = document.getElementById('detail-panel');
  if (type === 'concept') {
    const c = CONCEPTS.find(x => x.id === id);
    if (!c) return;
    const diffColor = DIFF_COLORS[c.difficulty] || '#888';
    const domainColor = DOMAIN_COLORS[c.domain] || '#888';
    let sourcesHtml = (c.sources || []).map(s => `<li>${s}</li>`).join('');
    let evPathHtml = '';
    if (c.evolution_path) {
      const ep = EVOLUTION_PATHS.find(e => e.id === c.evolution_path);
      if (ep) evPathHtml = `<div class="detail-section"><h4>📈 演进路径</h4><p style="color:${ep.color}">${ep.name}</p></div>`;
    }
    panel.innerHTML = `
      <h3 style="color:${domainColor}">${c.name}</h3>
      <div class="detail-meta">
        <span style="color:${domainColor}">● ${c.domain}</span> &nbsp;|&nbsp;
        <span style="color:${diffColor}">● ${c.difficulty_label}</span>
      </div>
      <div class="detail-section">
        <h4>📋 证据/支撑</h4>
        <p>${c.evidence || '暂无'}</p>
      </div>
      <div class="detail-section">
        <h4>📚 经典文献</h4>
        <ul>${sourcesHtml}</ul>
      </div>
      ${evPathHtml}
      <div class="detail-section">
        <h4>📍 位置</h4>
        <p>纬度 ${c.lat}° &nbsp; 经度 ${c.lon}°</p>
      </div>
    `;
  } else if (type === 'document') {
    const d = DOCUMENTS.find(x => x.id === id);
    if (!d) return;
    const relatedConcepts = (d.related || []).map(rid => {
      const c = CONCEPTS.find(cc => cc.id === rid);
      return c ? c.name : rid;
    }).join('、');
    panel.innerHTML = `
      <h3 style="color:#aaa">📄 ${d.name}</h3>
      <div class="detail-meta"><span>类型：${d.type}</span></div>
      <div class="detail-section">
        <h4>🔗 关联概念</h4>
        <p>${relatedConcepts}</p>
      </div>
    `;
  }
}

// ============ FILTERS ============
let activeDomain = null, activeDifficulty = null, activePath = null, searchQuery = '';
function onSearch(q) {
  searchQuery = q.toLowerCase();
  applyFilters();
}
function filterDomain(d, el) {
  activeDomain = d;
  document.querySelectorAll('.filter-group')[0].querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function filterDifficulty(d, el) {
  activeDifficulty = d;
  document.querySelectorAll('.filter-group')[1].querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function filterPath(p, el) {
  activePath = p;
  document.querySelectorAll('.filter-group')[2].querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function applyFilters() {
  conceptMeshes.forEach(mesh => {
    const c = CONCEPTS.find(x => x.id === mesh.userData.id);
    if (!c) return;
    let visible = true;
    if (activeDomain && c.domain !== activeDomain) visible = false;
    if (activeDifficulty && c.difficulty !== activeDifficulty) visible = false;
    if (activePath && c.evolution_path !== activePath) visible = false;
    if (searchQuery) {
      const q = searchQuery;
      const matchName = c.name.toLowerCase().includes(q);
      const matchDomain = c.domain.toLowerCase().includes(q);
      const matchEvidence = (c.evidence||'').toLowerCase().includes(q);
      const matchSources = (c.sources||[]).join(' ').toLowerCase().includes(q);
      if (!matchName && !matchDomain && !matchEvidence && !matchSources) visible = false;
    }
    mesh.visible = visible;
    mesh.children.forEach(child => { child.visible = visible; });
  });
  // Also filter path lines
  pathLines.forEach(pl => {
    pl.line.visible = (!activePath || pl.epId === activePath);
  });
}

// ============ SIDEBAR TOGGLE ============
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('toggle-sidebar');
  sb.classList.toggle('collapsed');
  btn.classList.toggle('chide');
  btn.textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  updateCamera();
  renderer.render(scene, camera);
}

// ============ START ============
init();
</script>
