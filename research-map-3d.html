// Latitude lines
function createLatLine(latDeg) {
  const phi = Math.PI / 2 - (latDeg * Math.PI / 180);
  const r = globeRadius * Math.cos(phi);
  const y = globeRadius * Math.sin(phi);
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const theta = (i / segments) * Math.PI * 2;
    points.push(new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x1a3050, transparent: true, opacity: 0.25 });
  return new THREE.Line(geo, mat);
}

// Longitude lines
function createLonLine(lonDeg) {
  const theta = lonDeg * Math.PI / 180;
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const phi = (i / segments) * Math.PI;
    points.push(new THREE.Vector3(
      globeRadius * Math.sin(phi) * Math.cos(theta),
      globeRadius * Math.cos(phi),
      globeRadius * Math.sin(phi) * Math.sin(theta)
    ));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x1a3050, transparent: true, opacity: 0.25 });
  return new THREE.Line(geo, mat);
}

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;
  ctx.fillStyle = color || '#ffffff';
  ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthWrite: false,
    opacity: 0.9,
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.8, 0.2, 1);

}

// ============ EVOLUTION PATH LINES ============
const pathGroup = new THREE.Group();
scene.add(pathGroup);
const pathMaterials = {};

EVOLUTION_PATHS.forEach(ep => {
  const pathColor = parseInt(ep.lineColor.replace('#', '0x'));
  const steps = ep.steps;

  // Connect consecutive steps with curves
  for (let i = 0; i < steps.length - 1; i++) {
    const fromId = steps[i][0];
    const toId = steps[i + 1][0];
    const fromMesh = conceptIdToMesh[fromId];
    const toMesh = conceptIdToMesh[toId];
    if (!fromMesh || !toMesh) continue;

    const from = fromMesh.position.clone();
    const to = toMesh.position.clone();

    // Create curved path (arc above sphere surface)
    const mid = from.clone().add(to).multiplyScalar(0.5);
    const midDist = mid.length();
    if (midDist > 0.01) {
      mid.normalize().multiplyScalar(globeRadius + 0.2);
    }

    const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
    const curvePoints = curve.getPoints(40);
    const curveGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
    const curveMat = new THREE.LineBasicMaterial({
      color: pathColor,
      transparent: true,
      opacity: 0.5,
      linewidth: 1,
      depthTest: true,
    });
    const line = new THREE.Line(curveGeo, curveMat);
    line.userData = { type: 'path', pathId: ep.id };
    pathGroup.add(line);

    // Arrow at midpoint (small cone)
    const midPoint = curve.getPoint(0.5);
    const arrowGeo = new THREE.ConeGeometry(0.03, 0.06, 6);
    const arrowMat = new THREE.MeshBasicMaterial({ color: pathColor, transparent: true, opacity: 0.7 });
    const arrow = new THREE.Mesh(arrowGeo, arrowMat);
    arrow.position.copy(midPoint);
    // Orient arrow along curve direction
    const dir = to.clone().sub(from).normalize();
    arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    arrow.userData = { type: 'path', pathId: ep.id };
    pathGroup.add(arrow);
  }

  // Store path material for toggling
  if (!pathMaterials[ep.id]) pathMaterials[ep.id] = [];
  pathMaterials[ep.id].push(pathColor);
});

raycaster.params.Points.threshold = 0.1;
raycaster.params.Line.threshold = 0.05;
const mouse = new THREE.Vector2();

let hoveredMesh = null;

function getIntersections(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(nodeMeshes);
}

// ============ UI INTERACTION ============
function highlightNode(conceptId) {
  // Reset all
  Object.values(conceptIdToMesh).forEach(m => {
    m.material.emissiveIntensity = 0.5;
    m.scale.set(1, 1, 1);
  });
  // Highlight selected
  const mesh = conceptIdToMesh[conceptId];
  if (mesh) {
    mesh.material.emissiveIntensity = 1.5;
    mesh.scale.set(1.8, 1.8, 1.8);
    selectedNodeId = conceptId;
  }
}

function updateDetailPanel(conceptId) {
  const c = CONCEPTS.find(c => c.id === conceptId);
  if (!c) { detailPanel.classList.remove('visible'); return; }

  detailPanel.classList.add('visible');
  document.getElementById('dp-name').textContent = c.name;
  document.getElementById('dp-domain').textContent = c.domain;

  // Badges
  const diffClass = 'badge-d' + c.difficulty;
  document.getElementById('dp-badges').innerHTML = `
    <span class="badge ${diffClass}">难度: ${c.difficulty_label}</span>
    <span class="badge" style="background:rgba(192,132,252,0.2);color:#C084FC;">${c.domain}</span>
  `;

  // Evidence
  document.getElementById('dp-evidence').textContent = c.evidence;

  // Sources
  const sourcesHtml = c.sources.map(s => `<div class="source-item">${s}</div>`).join('');
  document.getElementById('dp-sources').innerHTML = sourcesHtml;

  // Evolution path
  const pathEl = document.getElementById('dp-path');
  if (c.evolution_path) {
    const ep = EVOLUTION_PATHS.find(p => p.id === c.evolution_path);
    if (ep) {
      pathEl.innerHTML = `<span class="ep-badge" style="background:${ep.lineColor}22;color:${ep.lineColor};border:1px solid ${ep.lineColor}44;">${ep.name}</span>
      <div style="font-size:10px;color:#5c7a99;margin-top:4px;">${ep.description}</div>`;
    } else {
      pathEl.innerHTML = '<span style="color:#5c7a99;">—</span>';
    }
  } else {
    pathEl.innerHTML = '<span style="color:#5c7a99;">—</span>';
  }

  // Related documents
  const relatedDocs = DOCUMENTS.filter(d => {
    if (!d.related) return false;
    return d.related.includes(conceptId);
  });
  const docsEl = document.getElementById('dp-docs');
  if (relatedDocs.length > 0) {
    docsEl.innerHTML = relatedDocs.map(d =>
      `<div class="source-item">📄 ${d.name} <span style="color:#5c7a99;font-size:9px;">[${d.type}]</span></div>`
    ).join('');
  } else {
    docsEl.innerHTML = '<span style="color:#5c7a99;">—</span>';
  }

  highlightNode(conceptId);
}

function onNodeClick(conceptId) {
  updateDetailPanel(conceptId);
  // Smooth camera fly to node
  const mesh = conceptIdToMesh[conceptId];
  if (mesh) {
    const targetPos = mesh.position.clone();
    controls.target.lerp(targetPos, 0.5);
  }
}

renderer.domElement.addEventListener('click', (event) => {
  const intersects = getIntersections(event);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.type === 'concept') {
      onNodeClick(obj.userData.conceptId);
    } else if (obj.userData.type === 'document') {
      // For documents, show related concepts
      const related = obj.userData.related;
      const firstId = related && related.length > 0 ? related[0] : null;
      if (firstId) onNodeClick(firstId);
    }
  }
});

// Hover effect
renderer.domElement.addEventListener('mousemove', (event) => {
  const intersects = getIntersections(event);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.type === 'concept' || obj.userData.type === 'document') {
      renderer.domElement.style.cursor = 'pointer';
      if (hoveredMesh && hoveredMesh !== obj) {
        hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.type === 'concept' ? 0.5 : 0.4;
      }
      obj.material.emissiveIntensity = 1.2;
      hoveredMesh = obj;
    }
  } else {
    renderer.domElement.style.cursor = 'default';
    if (hoveredMesh) {
      hoveredMesh.material.emissiveIntensity = hoveredMesh.userData.type === 'concept' ? 0.5 : 0.4;
      hoveredMesh = null;
    }
  }
});

// ============ FILTERS ============
function applyFilters() {
  conceptGroup.children.forEach(child => {
    if (child.userData.type !== 'concept') return;
    const c = CONCEPTS.find(c => c.id === child.userData.conceptId);
    if (!c) return;

    let visible = true;
    if (activeDomain && c.domain !== activeDomain) visible = false;
    if (activeDifficulty && c.difficulty !== activeDifficulty) visible = false;
    if (activePath && c.evolution_path !== activePath) visible = false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const matchName = c.name.toLowerCase().includes(q);
      const matchEvidence = c.evidence.toLowerCase().includes(q);
      const matchSources = c.sources.some(s => s.toLowerCase().includes(q));
      if (!matchName && !matchEvidence && !matchSources) visible = false;
    }

    child.visible = visible;
    child.children.forEach(h => h.visible = visible);
  });

  // Also filter labels
  conceptGroup.children.forEach(child => {
    if (child.userData.type === 'label') {
      const mesh = conceptIdToMesh[child.userData.conceptId];
      child.visible = mesh ? mesh.visible : true;
    }
  });

  // Filter path lines
  if (activePath) {
    pathGroup.children.forEach(child => {
      child.visible = child.userData.pathId === activePath;
    });
  } else {
    pathGroup.children.forEach(child => {
      child.visible = true;
    });
  }
}

// Domain filter buttons
(function buildDomainFilters() {
  domainsSorted.forEach(d => {
    const btn = document.createElement('span');
    btn.className = 'filter-btn';
    btn.textContent = d;
    btn.onclick = () => {
      document.querySelectorAll('#domain-filters .filter-btn').forEach(b => b.classList.remove('active'));
      if (activeDomain === d) {
        activeDomain = null;
      } else {
        btn.classList.add('active');
        activeDomain = d;
      }
      applyFilters();
    };
    domainFilters.appendChild(btn);
  });
})();

// Difficulty filter buttons
(function buildDifficultyFilters() {
  const labels = { 1: '入门 🌱', 2: '中级 📘', 3: '高级 🔬', 4: '研究级 ⚡' };
  difficulties.forEach(d => {
    const btn = document.createElement('span');
    btn.className = 'filter-btn';
    btn.textContent = labels[d];
    btn.onclick = () => {
      document.querySelectorAll('#difficulty-filters .filter-btn').forEach(b => b.classList.remove('active'));
      if (activeDifficulty === d) {
        activeDifficulty = null;
      } else {
        btn.classList.add('active');
        activeDifficulty = d;
      }
      applyFilters();
    };
    difficultyFilters.appendChild(btn);
  });
})();

// Path filter buttons
(function buildPathFilters() {
  EVOLUTION_PATHS.forEach(ep => {
    const tag = document.createElement('span');
    tag.className = 'path-tag';
    tag.textContent = ep.name;
    tag.style.background = ep.lineColor + '22';
    tag.style.color = ep.lineColor;
    tag.style.border = '1px solid ' + ep.lineColor + '33';
    tag.onclick = () => {
      document.querySelectorAll('.path-tag').forEach(t => t.classList.remove('active'));
      if (activePath === ep.id) {
        activePath = null;
      } else {
        tag.classList.add('active');
        activePath = ep.id;
      }
      applyFilters();
    };
    pathFilters.appendChild(tag);
  });
})();

// Search
searchBox.addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  applyFilters();
  if (searchQuery) {
    // Try to find and select first match
    const q = searchQuery.toLowerCase();
    const match = CONCEPTS.find(c =>
      c.name.toLowerCase().includes(q) ||
      c.sources.some(s => s.toLowerCase().includes(q))
    );
    if (match) {
      updateDetailPanel(match.id);
      const mesh = conceptIdToMesh[match.id];
      if (mesh) controls.target.lerp(mesh.position, 0.3);
    }
  }
});

// ============ KEYBOARD SHORTCUTS ============
window.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'r':
      controls.autoRotate = !controls.autoRotate;
      break;
    case '0':
      // Reset view
      controls.target.set(0, 0, 0);
      camera.position.set(3, 1.8, 5.5);
      camera.lookAt(0, 0, 0);
      activeDomain = null;
      activeDifficulty = null;
      activePath = null;
      searchQuery = '';
      searchBox.value = '';
      selectedNodeId = null;
      document.querySelectorAll('.filter-btn, .path-tag').forEach(b => b.classList.remove('active'));
      detailPanel.classList.remove('visible');
      applyFilters();
      break;
    case 'f':
      // Front view
      controls.target.set(0, 0, 0);
      camera.position.set(0, 0, 6);
      break;
    case 't':
      // Top view
      controls.target.set(0, 0, 0);
      camera.position.set(0, 6, 0.1);
      break;
  }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let pulseTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  pulseTime += dt;

  controls.update();

  // Gentle pulsing of selected node
  if (selectedNodeId) {
    const mesh = conceptIdToMesh[selectedNodeId];
    if (mesh) {
      const pulse = 1 + 0.15 * Math.sin(pulseTime * 3);
      mesh.scale.set(pulse, pulse, pulse);
    }
  }

  // Document nodes orbit
  docGroup.children.forEach((child, idx) => {
    if (child.isMesh) {
      child.rotation.x += dt * 0.3;
      child.rotation.y += dt * 0.5;
      const oRadius = globeRadius + 0.35;
      const speed = 0.08 + idx * 0.01;
      const angle = (pulseTime * speed + idx * (Math.PI * 2 / DOCUMENTS.length)) % (Math.PI * 2);
      const yOffset = (idx % 3 - 1) * 0.25;
      child.position.x = oRadius * Math.cos(angle);
      child.position.z = oRadius * Math.sin(angle);
    }
  });

  // Slow star rotation
  stars.rotation.y += dt * 0.015;
  stars.rotation.x += dt * 0.005;

  renderer.render(scene, camera);
}

setTimeout(() => {
  loadingEl.classList.add('hidden');
  setTimeout(() => loadingEl.remove(), 500);
}, 800);

if (featured) {
  setTimeout(() => {
    updateDetailPanel(featured.id);

}
