}
function mkLonLine(lon){

  raycaster.setFromCamera(mouse,camera);
  const all=[...conceptMeshes,...docMeshes],hit=raycaster.intersectObjects(all);
  document.body.style.cursor=hit.length>0?'pointer':'default';
  all.forEach(m=>{if(hit.length>0&&hit[0].object===m){if(m.userData.id!==selectedNodeId)m.scale.setScalar(1.4);}else if(m.userData.id!==selectedNodeId)m.scale.setScalar(1);});
}

function showDetail(id,type){
  const p=document.getElementById('dp');
  if(type==='concept'){
    const c=CONCEPTS.find(x=>x.id===id);if(!c)return;
    const dc=DIFF_COLORS[c.difficulty]||'#888',docol=DOMAIN_COLORS[c.domain]||'#888';
    const sh=(c.sources||[]).map(s=>'<li>'+s+'</li>').join('');
    let epH='';if(c.evolution_path){const ep=EVOLUTION_PATHS.find(e=>e.id===c.evolution_path);if(ep)epH='<div style=margin:12px0><b style=color:'+ep.color+'>'+ep.name+'</b></div>';}
    p.innerHTML='<h3 style="color:'+docol+'">'+c.name+'</h3><div style="font-size:12px;color:#8899bb;margin:8px0"><span style="color:'+docol+'">'+c.domain+'</span> | <span style="color:'+dc+'">'+c.difficulty_label+'</span></div><div style="margin:12px0"><b>证据</b><p style="font-size:12px;color:#c0c8dd">'+ (c.evidence||'')+'</p></div><div style="margin:12px0"><b>文献</b><ul style="font-size:12px;color:#c0c8dd;padding-left:16px">'+sh+'</ul></div>'+epH;
  }else if(type==='doc'){
    const d=DOCUMENTS.find(x=>x.id===id);if(!d)return;
    const rel=(d.related||[]).map(rid=>{const c=CONCEPTS.find(cc=>cc.id===rid);return c?c.name:rid;}).join('、');
    p.innerHTML='<h3 style="color:#aaa">'+d.name+'</h3><div style="font-size:12px;color:#8899bb">'+d.type+'</div><div style="margin:12px0"><b>关联概念</b><p style="font-size:12px;color:#c0c8dd">'+rel+'</p></div>';
  }
}

let afd=null,afdi=null,afp=null;
function os(q){searchQ=q.toLowerCase();applyF();}
function fd(d,el){afd=d;el.parentElement.querySelectorAll('.fb').forEach(b=>b.classList.remove('a'));el.classList.add('a');applyF();}
function fdi(d,el){afdi=d;el.parentElement.querySelectorAll('.fb').forEach(b=>b.classList.remove('a'));el.classList.add('a');applyF();}
function fp(p,el){afp=p;el.parentElement.querySelectorAll('.fb').forEach(b=>b.classList.remove('a'));el.classList.add('a');applyF();}
function applyF(){
  conceptMeshes.forEach(mesh=>{
    const c=CONCEPTS.find(x=>x.id===mesh.userData.id);if(!c)return;
    let v=true;
    if(afd&&c.domain!==afd)v=false;
    if(afdi&&c.difficulty!==afdi)v=false;
    if(afp&&c.evolution_path!==afp)v=false;
    if(searchQ){const q=searchQ;if(!c.name.toLowerCase().includes(q)&&!c.domain.toLowerCase().includes(q)&&!(c.evidence||'').toLowerCase().includes(q)&&!(c.sources||[]).join(' ').toLowerCase().includes(q))v=false;}
    mesh.visible=v;mesh.children.forEach(ch=>ch.visible=v);
  });
  pathLines.forEach(pl=>{pl.line.visible=!afp||pl.epId===afp;});
}

function tsb(){const sb=document.getElementById('sb'),tb=document.getElementById('tb');sb.classList.toggle('c');tb.classList.toggle('c');tb.textContent=sb.classList.contains('c')?'▶':'◀';}

function animate(){requestAnimationFrame(animate);updateCamera();renderer.render(scene,camera);}

// Start
waitForTHREE(init);
</script>
